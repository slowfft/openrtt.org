<!DOCTYPE html>
<html>
  <head>
    <title>{{ .Title }}</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    {{ $css := resources.Get "css/style.css" }} {{ $style := $css | minify | fingerprint }}
    <link rel="stylesheet" href="{{ $style.RelPermalink }}" media="screen" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  </head>
  <body>
    <nav>
      <div class="wrap">
        <a class="logo" href="/">
          <div class="logo-text">OpenRTT</div>
          <div class="tagline">Research on real-time text</div>
        </a>
        <div class="links">
          <a href="/">Home</a> - <a href="/history">History</a> - <a href="/design">Design</a> -
          <a href="/contact">Contact</a>
        </div>
      </div>
    </nav>
    <article>
      <div class="wrap">{{ .Content }}</div>
    </article>
    <footer>
      <div class="wrap"></div>
    </footer>
  </body>
</html>
